# ThorOS full-duplex voice (v1.4): acoustic echo cancellation, so the assistant's own speech
# is subtracted from the microphone and a user can interrupt it mid-sentence ("barge in")
# without the mic hearing the speakers. Creates an echo-cancelled source/sink pair and makes
# them session defaults via priority; the voice loop just reads the default source.
# If the echo-cancel module isn't available on this system, this config is skipped (nofail)
# and the voice loop falls back to its adaptive loudness-envelope barge-in.
context.modules = [
    {   name = libpipewire-module-echo-cancel
        args = {
            monitor.mode = false
            source.props = {
                node.name        = "yggdrasil.ec.source"
                node.description = "ThorOS echo-cancelled microphone"
                priority.session = 2000
            }
            sink.props = {
                node.name        = "yggdrasil.ec.sink"
                node.description = "ThorOS echo-cancelled output"
                priority.session = 2000
            }
        }
        flags = [ ifexists nofail ]
    }
]
